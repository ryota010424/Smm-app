<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMM Market Analysis - CV. Sugih Mekar Mandiri</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background-color: #f0fdf4; color: #111827; padding-bottom: 60px; }
        .card { background: white; border-radius: 12px; border: 1px solid #e5e7eb; margin-bottom: 16px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.06); padding: 15px; }
        .input-box { width: 100%; padding: 8px 12px; border-radius: 8px; border: 1.5px solid #d1d5db; font-size: 14px; box-sizing: border-box; outline: none; margin-bottom: 10px; display: block; }
        .label-text { font-size: 12px; font-weight: 700; color: #374151; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const STORAGE_KEY = "smm-market-v3-updated";

        // --- DATA STRUCTURE ---
        const emptyWilayah = () => ({
            _id: Date.now() + Math.random(),
            namaWilayah: "",
            // Mengganti checkbox dengan 5 kolom manual
            p1: "", p2: "", p3: "", p4: "", p5: "", 
            produkTerjual: "", // Kolom Tambahan Baru
            jumlahPetani: "",
            jumlahKios: "",
            dayaBeli: "",
            catatanWilayah: "",
            kendalaUtama: "",
            kendalaDistribusi: "",
            kendalaKompetitor: "",
            kendalaProduk: "",
            produk1: "", alasan1: "", produk2: "", alasan2: "", produk3: "", alasan3: "",
            kebutuhanBelumAda: ""
        });

        const emptyForm = () => ({
            nama: "", periode: "", kabupaten: "",
            wilayahData: [emptyWilayah()]
        });

        // --- PDF ENGINE (Tetap Sesuai Struktur v3) ---
        function exportToPdf(e) {
            const tgl = new Date(e.createdAt).toLocaleDateString("id-ID", { day: "numeric", month: "long", year: "numeric" });
            const wilayahBlocks = e.wilayahData.map((w, i) => {
                const potensi = [w.p1, w.p2, w.p3, w.p4, w.p5].filter(x => x).join(", ");
                return `
                <div style="margin-bottom:20px; border:1.5px solid #d1fae5; border-radius:10px; overflow:hidden; page-break-inside:avoid;">
                    <div style="background:#15803d; color:#fff; padding:10px; font-weight:800;">W${i+1} - ${w.namaWilayah}</div>
                    <div style="padding:15px; font-size:12px;">
                        <table style="width:100%; border-collapse:collapse;">
                            <tr><td style="width:120px; font-weight:bold; color:#15803d;">Potensi:</td><td>${potensi || "-"}</td></tr>
                            <tr style="background:#fffbeb;"><td style="font-weight:bold; color:#b45309;">Produk Terjual:</td><td>${w.produkTerjual || "-"}</td></tr>
                            <tr><td style="font-weight:bold;">Petani/Kios:</td><td>${w.jumlahPetani || "-"} / ${w.jumlahKios || "-"}</td></tr>
                            <tr><td style="font-weight:bold;">Daya Beli:</td><td>${w.dayaBeli || "-"}</td></tr>
                            <tr style="background:#fef2f2;"><td style="font-weight:bold; color:#b91c1c;">Kendala:</td><td>${w.kendalaUtama || "-"}</td></tr>
                        </table>
                    </div>
                </div>`;
            }).join("");

            const html = `<html><body style="font-family:sans-serif; padding:30px;">
                <div style="text-align:center; border-bottom:2px solid #15803d; padding-bottom:10px; margin-bottom:20px;">
                    <h2 style="margin:0; color:#15803d;">MARKET ANALYSIS REPORT</h2>
                    <p style="margin:5px 0;">CV. SUGIH MEKAR MANDIRI</p>
                </div>
                <p><b>Sales:</b> ${e.nama} | <b>Periode:</b> ${e.periode} | <b>Tgl:</b> ${tgl}</p>
                ${wilayahBlocks}
            </body></html>`;

            const win = window.open("", "_blank");
            win.document.write(html); win.document.close(); win.print();
        }

        // --- COMPONENTS ---
        function App() {
            const [tab, setTab] = useState("form");
            const [form, setForm] = useState(emptyForm());
            const [entries, setEntries] = useState([]);

            useEffect(() => {
                const data = localStorage.getItem(STORAGE_KEY);
                if (data) setEntries(JSON.parse(data));
            }, []);

            const handleSave = () => {
                if (!form.nama) return alert("Nama Sales wajib diisi!");
                const newList = [{ ...form, id: Date.now(), createdAt: new Date().toISOString() }, ...entries];
                localStorage.setItem(STORAGE_KEY, JSON.stringify(newList));
                setEntries(newList); setForm(emptyForm()); setTab("rekap");
            };

            return (
                <div style={{ maxWidth: 640, margin: "0 auto" }}>
                    <div style={{ background: "linear-gradient(135deg,#15803d,#16a34a)", padding: "20px", color: "#fff", textAlign: "center", borderRadius: "0 0 20px 20px" }}>
                        <div style={{ fontSize: 10, fontWeight: 900, letterSpacing: 1.5 }}>CV. SUGIH MEKAR MANDIRI</div>
                        <h2 style={{ margin: "5px 0" }}>Analisis Potensi Pasar</h2>
                        <div style={{ display: "flex", gap: 10, marginTop: 15 }}>
                            <button onClick={() => setTab("form")} style={{ flex: 1, padding: "10px", borderRadius: 8, border: "none", fontWeight: 700, background: tab === "form" ? "#fff" : "rgba(255,255,255,0.2)", color: tab === "form" ? "#15803d" : "#fff" }}>📝 INPUT</button>
                            <button onClick={() => setTab("rekap")} style={{ flex: 1, padding: "10px", borderRadius: 8, border: "none", fontWeight: 700, background: tab === "rekap" ? "#fff" : "rgba(255,255,255,0.2)", color: tab === "rekap" ? "#15803d" : "#fff" }}>📊 REKAP</button>
                        </div>
                    </div>

                    <div style={{ padding: "15px" }}>
                        {tab === "form" ? (
                            <div>
                                <div className="card">
                                    <span className="label-text">Identitas Sales</span>
                                    <input className="input-box" value={form.nama} onChange={e => setForm({...form, nama: e.target.value})} placeholder="Nama Sales *" />
                                    <input className="input-box" value={form.periode} onChange={e => setForm({...form, periode: e.target.value})} placeholder="Periode (Bulan/Tahun)" />
                                    <input className="input-box" value={form.kabupaten} onChange={e => setForm({...form, kabupaten: e.target.value})} placeholder="Kabupaten" />
                                </div>

                                {form.wilayahData.map((w, i) => (
                                    <div key={w._id} className="card">
                                        <div style={{fontWeight:800, color:"#15803d", marginBottom:10}}>📍 WILAYAH {i+1}</div>
                                        <input className="input-box" value={w.namaWilayah} onChange={e => {
                                            const nd = [...form.wilayahData]; nd[i].namaWilayah = e.target.value; setForm({...form, wilayahData: nd});
                                        }} placeholder="Nama Kecamatan/Desa *" />

                                        {/* 5 KOLOM POTENSI (Ketik Manual) */}
                                        <div style={{background:"#f0fdf4", padding:10, borderRadius:8, marginBottom:10}}>
                                            <span className="label-text" style={{color:"#15803d"}}>🌾 5 POTENSI KOMODITAS</span>
                                            <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:5}}>
                                                {[1,2,3,4,5].map(n => (
                                                    <input key={n} className="input-box" style={{marginBottom:4, fontSize:12}} placeholder={`Potensi ${n}`} value={w[`p${n}`]} onChange={e => {
                                                        const nd = [...form.wilayahData]; nd[i][`p${n}`] = e.target.value; setForm({...form, wilayahData: nd});
                                                    }} />
                                                ))}
                                            </div>
                                        </div>

                                        {/* KOLOM PRODUK TERJUAL */}
                                        <div style={{background:"#fffbeb", padding:10, borderRadius:8, marginBottom:10}}>
                                            <span className="label-text" style={{color:"#b45309"}}>📦 PRODUK SMM TERJUAL</span>
                                            <textarea className="input-box" rows="2" value={w.produkTerjual} onChange={e => {
                                                const nd = [...form.wilayahData]; nd[i].produkTerjual = e.target.value; setForm({...form, wilayahData: nd});
                                            }} placeholder="Tulis produk yang sudah terjual di sini..." />
                                        </div>

                                        <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:10}}>
                                            <input className="input-box" value={w.jumlahPetani} onChange={e => {
                                                const nd = [...form.wilayahData]; nd[i].jumlahPetani = e.target.value; setForm({...form, wilayahData: nd});
                                            }} placeholder="Est. Jumlah Petani" />
                                            <input className="input-box" value={w.kendalaUtama} onChange={e => {
                                                const nd = [...form.wilayahData]; nd[i].kendalaUtama = e.target.value; setForm({...form, wilayahData: nd});
                                            }} placeholder="Kendala Utama" />
                                        </div>
                                    </div>
                                ))}

                                <button onClick={() => setForm({...form, wilayahData: [...form.wilayahData, emptyWilayah()]})} style={{ width: "100%", padding: 12, marginBottom: 15, borderRadius: 10, border: "2px dashed #16a34a", color: "#16a34a", background: "white", fontWeight: 700 }}>+ Tambah Wilayah</button>
                                <button onClick={handleSave} style={{ width: "100%", padding: 15, borderRadius: 10, background: "#16a34a", color: "#fff", border: "none", fontWeight: 800, fontSize: 16 }}>💾 SIMPAN LAPORAN</button>
                            </div>
                        ) : (
                            <div>
                                {entries.map(e => (
                                    <div key={e.id} className="card">
                                        <div style={{fontWeight:800}}>{e.nama} - {e.periode}</div>
                                        <div style={{fontSize:12, color:"#666"}}>{e.wilayahData.length} Wilayah Tercatat</div>
                                        <button onClick={() => exportToPdf(e)} style={{width:"100%", padding:10, marginTop:10, borderRadius:8, background:"#1e40af", color:"#fff", border:"none", fontWeight:700}}>📄 Export PDF</button>
                                        <button onClick={() => {
                                            const filtered = entries.filter(x => x.id !== e.id);
                                            setEntries(filtered); localStorage.setItem(STORAGE_KEY, JSON.stringify(filtered));
                                        }} style={{width:"100%", padding:5, marginTop:5, background:"none", color:"red", border:"none", fontSize:11}}>Hapus</button>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
