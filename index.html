<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SMM Market Analysis v3.4</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #f0fdf4;
      color: #111827;
      min-height: 100vh;
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #f0fdf4; }
    ::-webkit-scrollbar-thumb { background: #86efac; border-radius: 10px; }

    .header {
      background: linear-gradient(135deg, #14532d 0%, #15803d 50%, #16a34a 100%);
      padding: 28px 20px 0;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 4px 20px rgba(21,128,61,0.3);
    }
    .header-inner { max-width: 680px; margin: 0 auto; }
    .header-brand { font-size: 10px; font-weight: 800; letter-spacing: 3px; opacity: 0.65; color: #fff; margin-bottom: 4px; }
    .header-title { font-size: 22px; font-weight: 900; color: #fff; line-height: 1.1; }
    .header-sub { font-size: 12px; color: rgba(255,255,255,0.65); margin-top: 2px; font-weight: 500; }
    .tab-bar { display: flex; gap: 6px; margin-top: 20px; }
    .tab-btn {
      flex: 1; padding: 13px 10px; border: none;
      border-radius: 10px 10px 0 0;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 800; font-size: 12px; letter-spacing: 0.5px;
      cursor: pointer; transition: all 0.25s;
    }
    .tab-btn.active { background: #f0fdf4; color: #15803d; }
    .tab-btn.inactive { background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.85); }
    .tab-btn.inactive:hover { background: rgba(255,255,255,0.2); }

    .main { max-width: 680px; margin: 0 auto; padding: 20px 16px 80px; }

    .card {
      background: #fff;
      border-radius: 14px;
      border: 1.5px solid #e5e7eb;
      padding: 18px;
      margin-bottom: 14px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.05);
    }
    .section-header {
      font-size: 10px; font-weight: 800; letter-spacing: 1.2px;
      padding-bottom: 8px; margin-bottom: 12px;
      border-bottom: 1.5px solid currentColor;
      opacity: 0.9;
    }

    .field { margin-bottom: 12px; }
    .field label {
      display: block; font-size: 11px; font-weight: 700;
      color: #374151; margin-bottom: 4px; letter-spacing: 0.3px;
    }
    .field label.error { color: #dc2626; }
    .field input, .field textarea {
      width: 100%; padding: 9px 12px;
      border-radius: 8px; border: 1.5px solid #e5e7eb;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 13px; font-weight: 500; outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      background: #fdfdfd;
      color: #111827;
    }
    .field input:focus, .field textarea:focus {
      border-color: #16a34a;
      box-shadow: 0 0 0 3px rgba(22,163,74,0.1);
    }
    .field input.error { border-color: #fca5a5; background: #fffafa; }
    .field textarea { resize: vertical; min-height: 62px; line-height: 1.5; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .grid-5 { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }

    .btn-primary {
      width: 100%; padding: 15px; border-radius: 12px; border: none;
      background: linear-gradient(135deg, #16a34a, #15803d);
      color: #fff; font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 800; font-size: 15px; cursor: pointer;
      box-shadow: 0 4px 14px rgba(22,163,74,0.35);
      transition: all 0.2s; letter-spacing: 0.3px;
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(22,163,74,0.4); }
    .btn-primary:disabled { background: #d1d5db; box-shadow: none; cursor: not-allowed; transform: none; }
    .btn-pdf {
      width: 100%; padding: 13px; border-radius: 10px; border: none;
      background: linear-gradient(135deg, #1e40af, #2563eb);
      color: #fff; font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 700; font-size: 14px; cursor: pointer;
      box-shadow: 0 4px 14px rgba(30,64,175,0.3);
      transition: all 0.2s; margin-bottom: 16px;
    }
    .btn-pdf:hover { transform: translateY(-1px); }
    .btn-danger {
      padding: 9px 16px; border-radius: 8px;
      border: 1.5px solid #fca5a5; background: #fff;
      color: #dc2626; font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 700; font-size: 13px; cursor: pointer;
      transition: all 0.2s;
    }
    .btn-danger:hover { background: #fee2e2; }
    .btn-back {
      background: none; border: none; color: #15803d;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 700; font-size: 13px; cursor: pointer;
      padding: 0; margin-bottom: 16px; display: flex; align-items: center; gap: 6px;
    }
    .btn-add {
      padding: 9px 18px; border-radius: 8px;
      border: 1.5px solid #16a34a; background: #f0fdf4;
      color: #16a34a; font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 700; font-size: 13px; cursor: pointer;
      transition: all 0.2s;
    }
    .btn-add:hover { background: #dcfce7; }

    .toggle-btn {
      padding: 6px 14px; border-radius: 20px; font-size: 12px;
      cursor: pointer; font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 600; transition: all 0.2s; border: 1.5px solid;
    }
    .check-pill {
      padding: 5px 12px; border-radius: 20px; font-size: 11px;
      cursor: pointer; font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 600; transition: all 0.2s; border: 1.5px solid;
      white-space: nowrap;
    }

    .badge {
      display: inline-block; padding: 3px 10px;
      border-radius: 20px; font-size: 11px; font-weight: 700;
    }
    .badge-green { background: #d1fae5; color: #065f46; }
    .badge-blue { background: #dbeafe; color: #1e40af; }
    .badge-yellow { background: #fef3c7; color: #92400e; }
    .badge-red { background: #fee2e2; color: #991b1b; }
    .badge-gray { background: #f3f4f6; color: #374151; }

    .wilayah-card {
      border: 1.5px solid #e5e7eb; border-radius: 12px;
      margin-bottom: 14px; overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
      transition: border-color 0.2s;
    }
    .wilayah-card.error-border { border-color: #fca5a5; }
    .wilayah-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px; cursor: pointer; border-bottom: 1.5px solid transparent;
      transition: background 0.2s;
    }
    .wilayah-header.open { background: #f0fdf4; border-bottom-color: #d1fae5; }
    .wilayah-header.closed { background: #f9fafb; }
    .wilayah-body { padding: 16px; background: #fff; }
    .w-num {
      color: #fff; border-radius: 7px; padding: 4px 10px;
      font-size: 11px; font-weight: 800; letter-spacing: 0.5px;
    }

    .box-green { background: #f0fdf4; border-radius: 10px; padding: 14px; margin-bottom: 12px; }
    .box-red { background: #fef2f2; border-radius: 10px; padding: 14px; margin-bottom: 12px; }
    .box-blue { background: #eff6ff; border-radius: 10px; padding: 14px; margin-bottom: 12px; }
    .box-amber { background: #fffbeb; border: 1px solid #fde68a; border-radius: 10px; padding: 12px; margin-bottom: 12px; }
    .box-purple { background: #f5f3ff; border: 1px solid #ddd6fe; border-radius: 10px; padding: 14px; margin-bottom: 12px; }

    .rekap-card {
      background: #fff; padding: 18px; border-radius: 14px;
      border: 1.5px solid #e5e7eb; cursor: pointer;
      transition: all 0.2s; margin-bottom: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    }
    .rekap-card:hover { border-color: #16a34a; transform: translateY(-2px); box-shadow: 0 4px 14px rgba(22,163,74,0.12); }

    .detail-wilayah {
      border: 1px solid #e5e7eb; border-radius: 10px;
      margin-bottom: 10px; overflow: hidden;
    }
    .detail-wilayah-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 11px 14px; cursor: pointer; transition: background 0.2s;
    }
    .detail-wilayah-header.open { background: #f0fdf4; border-bottom: 1px solid #d1fae5; }
    .detail-wilayah-header.closed { background: #f9fafb; }
    .detail-wilayah-body { padding: 14px; background: #fff; }

    .search-box {
      width: 100%; padding: 11px 16px 11px 40px;
      border-radius: 10px; border: 1.5px solid #e5e7eb;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 13px; font-weight: 500; outline: none;
      background: #fff; color: #111827;
      transition: border-color 0.2s, box-shadow 0.2s;
      margin-bottom: 14px;
    }
    .search-box:focus { border-color: #16a34a; box-shadow: 0 0 0 3px rgba(22,163,74,0.1); }
    .search-wrap { position: relative; }
    .search-icon {
      position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
      font-size: 14px; pointer-events: none; color: #9ca3af;
    }

    .stats-bar {
      background: linear-gradient(135deg, #0f766e, #0d9488);
      border-radius: 14px; padding: 18px; color: #fff;
      margin-bottom: 16px;
    }

    .detail-header {
      background: linear-gradient(135deg, #15803d, #16a34a);
      border-radius: 14px; padding: 20px; color: #fff;
      margin-bottom: 14px;
    }

    .kom-input {
      width: 100%; padding: 7px 10px;
      border-radius: 7px; border: 1.5px solid #d1fae5;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 12px; font-weight: 500; outline: none;
      background: #fff; margin-bottom: 6px;
      transition: border-color 0.2s;
    }
    .kom-input:focus { border-color: #16a34a; }

    .toast {
      background: #d1fae5; border: 1px solid #6ee7b7;
      border-radius: 10px; padding: 12px 16px;
      color: #065f46; font-weight: 700; text-align: center;
      margin-bottom: 16px; font-size: 13px;
      animation: slideDown 0.3s ease;
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Star Rating */
    .star-row { display: flex; gap: 6px; }
    .star-btn {
      font-size: 22px; background: none; border: none;
      cursor: pointer; line-height: 1; padding: 2px;
      transition: transform 0.15s;
    }
    .star-btn:hover { transform: scale(1.2); }

    @media (max-width: 480px) {
      .grid-2 { grid-template-columns: 1fr; }
      .header-title { font-size: 18px; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const FASE = ["Pengolahan Lahan", "Vegetatif", "Generatif", "Panen"];
    const STORAGE_KEY = "smm-market-v3-ultra-final";

    const emptyWilayah = () => ({
      _id: Date.now() + Math.random(),
      namaWilayah: "",
      p1:"", p2:"", p3:"", p4:"", p5:"",
      produkTerjual: "",
      fase: [],
      jumlahPetani: "", jumlahKios: "", dayaBeli: "", catatanWilayah: "",
      kendalaUtama: "", kendalaDistribusi: "", kendalaKompetitor: "", kendalaProduk: "",
      produk1:"", alasan1:"", produk2:"", alasan2:"", produk3:"", alasan3:"",
      kebutuhanBelumAda: ""
    });

    const emptyForm = () => ({
      nama:"", periode:"", kabupaten:"", wilayahData:[emptyWilayah()],
      targetKunjungan:"", realisasiKunjungan:"",
      selfScore: 0,
      catatanDiri: "",
      rencanaTindakLanjut: ""
    });

    function loadEntries() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]"); } catch { return []; }
    }
    function saveEntries(list) { localStorage.setItem(STORAGE_KEY, JSON.stringify(list)); }

    function Field({ label, value, onChange, placeholder, required }) {
      const hasError = required && !value.trim();
      return (
        <div className="field">
          <label className={hasError ? "error" : ""}>{label}{required ? " *" : ""}</label>
          <input value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder}
            className={hasError ? "error" : ""}
            onFocus={e => { if (!hasError) e.target.style.borderColor="#16a34a"; }}
            onBlur={e => { if (!hasError) e.target.style.borderColor="#e5e7eb"; }} />
        </div>
      );
    }

    function Area({ label, value, onChange, placeholder }) {
      return (
        <div className="field">
          <label>{label}</label>
          <textarea value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder}
            onFocus={e => e.target.style.borderColor="#16a34a"}
            onBlur={e => e.target.style.borderColor="#e5e7eb"} />
        </div>
      );
    }

    function CheckGroup({ options, selected, onChange, color="#16a34a" }) {
      return (
        <div style={{display:"flex", flexWrap:"wrap", gap:6}}>
          {options.map(opt => {
            const active = selected.includes(opt);
            return (
              <button key={opt} className="check-pill"
                onClick={() => onChange(active ? selected.filter(x=>x!==opt) : [...selected, opt])}
                style={{ borderColor: active ? color : "#d1d5db", background: active ? color : "#fff", color: active ? "#fff" : "#374151" }}>
                {opt}
              </button>
            );
          })}
        </div>
      );
    }

    function DayaBeli({ value, onChange }) {
      const opts = [["Tinggi","#16a34a"],["Sedang","#d97706"],["Rendah","#dc2626"]];
      return (
        <div style={{display:"flex", gap:8, flexWrap:"wrap"}}>
          {opts.map(([lvl, clr]) => (
            <button key={lvl} className="toggle-btn"
              onClick={() => onChange(value===lvl ? "" : lvl)}
              style={{ borderColor: value===lvl ? clr : "#d1d5db", background: value===lvl ? clr : "#fff", color: value===lvl ? "#fff" : "#374151" }}>
              {lvl}
            </button>
          ))}
        </div>
      );
    }

    function StarRating({ value, onChange }) {
      const [hover, setHover] = useState(0);
      const labels = ["","Sangat Kurang","Kurang","Cukup","Baik","Sangat Baik"];
      return (
        <div>
          <div className="star-row">
            {[1,2,3,4,5].map(n => (
              <button key={n} className="star-btn"
                onClick={() => onChange(value===n ? 0 : n)}
                onMouseEnter={() => setHover(n)}
                onMouseLeave={() => setHover(0)}>
                {n <= (hover || value) ? "⭐" : "☆"}
              </button>
            ))}
          </div>
          {(hover || value) > 0 && (
            <div style={{fontSize:12, color:"#6b7280", marginTop:4, fontWeight:600}}>
              {labels[hover || value]}
            </div>
          )}
        </div>
      );
    }

    function WilayahCard({ data, index, onChange, onRemove, canRemove }) {
      const [open, setOpen] = useState(true);
      const s = k => v => onChange({...data, [k]: v});
      const isErr = !data.namaWilayah.trim();

      return (
        <div className={`wilayah-card${isErr ? " error-border" : ""}`}>
          <div className={`wilayah-header ${open?"open":"closed"}`} onClick={() => setOpen(o=>!o)}>
            <div style={{display:"flex", alignItems:"center", gap:10}}>
              <span className="w-num" style={{background: isErr?"#dc2626":"#15803d"}}>W{index+1}</span>
              <span style={{fontSize:14, fontWeight:700, color: data.namaWilayah?"#111827":"#9ca3af"}}>
                {data.namaWilayah || "Belum dinamai ⚠️"}
              </span>
            </div>
            <div style={{display:"flex", gap:8, alignItems:"center"}}>
              {canRemove && <button onClick={e=>{e.stopPropagation();onRemove();}}
                style={{background:"#fee2e2",border:"none",borderRadius:6,padding:"4px 9px",cursor:"pointer",color:"#dc2626",fontSize:12,fontWeight:700}}>✕</button>}
              <span style={{color:"#9ca3af",fontSize:12}}>{open?"▲":"▼"}</span>
            </div>
          </div>

          {open && (
            <div className="wilayah-body">
              <Field label="📍 Nama Kecamatan / Wilayah" value={data.namaWilayah} onChange={s("namaWilayah")} placeholder="Wajib diisi" required />

              <div className="box-green">
                <div className="section-header" style={{color:"#15803d"}}>🌾 POTENSI WILAYAH</div>
                <div className="field">
                  <label>5 Komoditas Utama</label>
                  <div className="grid-5">
                    {[1,2,3,4,5].map(n => (
                      <input key={n} value={data[`p${n}`]} onChange={e=>s(`p${n}`)(e.target.value)}
                        placeholder={`Komoditas ${n}`} className="kom-input" />
                    ))}
                  </div>
                </div>
                <div className="box-amber">
                  <Area label="📦 Produk SMM Terjual Periode Ini" value={data.produkTerjual} onChange={s("produkTerjual")} placeholder="Daftar produk SMM yang laku, qty, kios penjual..." />
                </div>
                <div className="field" style={{marginBottom:12}}>
                  <label>Fase Tanam</label>
                  <CheckGroup options={FASE} selected={data.fase} onChange={s("fase")} color="#0891b2" />
                </div>
                <div className="grid-2">
                  <Field label="Petani Aktif (est.)" value={data.jumlahPetani} onChange={s("jumlahPetani")} placeholder="cth: 150 orang" />
                  <Field label="Kios / Toko (est.)" value={data.jumlahKios} onChange={s("jumlahKios")} placeholder="cth: 8 kios" />
                </div>
                <div className="field" style={{marginBottom:8}}>
                  <label>Daya Beli Petani</label>
                  <DayaBeli value={data.dayaBeli} onChange={s("dayaBeli")} />
                </div>
                <Area label="Catatan Potensi" value={data.catatanWilayah} onChange={s("catatanWilayah")} placeholder="Kondisi musim, infrastruktur, potensi lahan..." />
              </div>

              <div className="box-red">
                <div className="section-header" style={{color:"#b91c1c"}}>⚠️ KENDALA</div>
                <Area label="Kendala Utama Petani" value={data.kendalaUtama} onChange={s("kendalaUtama")} placeholder="cth: Modal terbatas, kurang edukasi" />
                <Area label="Kendala Distribusi / Akses" value={data.kendalaDistribusi} onChange={s("kendalaDistribusi")} placeholder="cth: Jalan rusak, kios jauh dari lahan" />
                <Area label="Kendala Kompetitor" value={data.kendalaKompetitor} onChange={s("kendalaKompetitor")} placeholder="cth: Merek lain lebih murah, loyalitas lama" />
                <Area label="Kendala Produk SMM" value={data.kendalaProduk} onChange={s("kendalaProduk")} placeholder="cth: Stok kosong, kemasan kurang praktis" />
              </div>

              <div className="box-blue">
                <div className="section-header" style={{color:"#1d4ed8"}}>🧪 REKOMENDASI PRODUK</div>
                {[1,2,3].map(n => (
                  <div key={n} className="grid-2" style={{marginBottom:6}}>
                    <Field label={`Produk Prioritas ${n}`} value={data[`produk${n}`]} onChange={s(`produk${n}`)} placeholder="Nama produk" />
                    <Field label="Alasan" value={data[`alasan${n}`]} onChange={s(`alasan${n}`)} placeholder="Kenapa cocok?" />
                  </div>
                ))}
                <Area label="💡 Kebutuhan Belum Ada Produknya" value={data.kebutuhanBelumAda} onChange={s("kebutuhanBelumAda")} placeholder="cth: Pupuk granul slow-release untuk padi" />
              </div>
            </div>
          )}
        </div>
      );
    }

    function FormView({ onSave }) {
      const [form, setForm] = useState(emptyForm());
      const [saving, setSaving] = useState(false);
      const [saved, setSaved] = useState(false);

      const sf = k => v => setForm(f => ({...f, [k]: v}));
      const isInvalid = !form.nama.trim() || form.wilayahData.some(w => !w.namaWilayah.trim());

      const handleSave = () => {
        if (isInvalid) return;
        setSaving(true);
        setTimeout(() => {
          const entry = {...form, id: Date.now(), createdAt: new Date().toISOString()};
          const list = loadEntries();
          list.unshift(entry);
          saveEntries(list);
          setForm(emptyForm());
          setSaving(false);
          setSaved(true);
          setTimeout(() => setSaved(false), 3000);
          onSave();
        }, 400);
      };

      return (
        <div>
          {saved && <div className="toast">✅ Laporan berhasil disimpan ke Rekap!</div>}

          <div className="card">
            <div className="section-header" style={{color:"#15803d"}}>👤 IDENTITAS SALES</div>
            <Field label="Nama Sales" value={form.nama} onChange={sf("nama")} placeholder="cth: Budi Santoso" required />
            <div className="grid-2">
              <Field label="Periode" value={form.periode} onChange={sf("periode")} placeholder="cth: April 2026" />
              <Field label="Kabupaten / Kota" value={form.kabupaten} onChange={sf("kabupaten")} placeholder="cth: Subang" />
            </div>
          </div>

          {/* KPI Section */}
          <div className="card">
            <div className="section-header" style={{color:"#7c3aed"}}>📊 KINERJA & EVALUASI DIRI</div>
            <div className="grid-2">
              <Field label="🎯 Target Kunjungan" value={form.targetKunjungan} onChange={sf("targetKunjungan")} placeholder="cth: 20 kunjungan" />
              <Field label="✅ Realisasi Kunjungan" value={form.realisasiKunjungan} onChange={sf("realisasiKunjungan")} placeholder="cth: 18 kunjungan" />
            </div>
            <div className="field" style={{marginBottom:12}}>
              <label>Penilaian Performa Diri (1–5 Bintang)</label>
              <StarRating value={form.selfScore} onChange={sf("selfScore")} />
            </div>

    function buildPdfHtml(e) {

      const noLaporan = `SMM-${e.kabupaten?.replace(/\s+/g,"").toUpperCase().slice(0,3)||"XXX"}-${new Date(e.createdAt).toLocaleDateString("id-ID",{month:"2-digit",year:"numeric"}).replace("/","")}${String(e.id).slice(-4)}`;
      const starLabels = ["","Sangat Kurang","Kurang","Cukup","Baik","Sangat Baik"];

      const kpiColor = kpiPct === null ? "#6b7280" : kpiPct >= 100 ? "#15803d" : kpiPct >= 80 ? "#d97706" : "#dc2626";

      // Summary table rows
      const summaryRows = (e.wilayahData||[]).map((w,i) => {

      // Wilayah detail blocks

        const produkItems = [1,2,3].filter(n=>w[`produk${n}`]);

        return `

        </div>
        <div style="padding:14px;border-radius:10px;border:1px solid #e5e7eb;text-align:center;background:${kpiPct===null?"#f9fafb":kpiPct>=100?"#d1fae5":kpiPct>=80?"#fef3c7":"#fee2e2"};">
          <div style="font-size:9px;color:#374151;font-weight:800;letter-spacing:0.5px;margin-bottom:4px;">PENCAPAIAN</div>
          <div style="font-size:22px;font-weight:900;color:${kpiColor};">${kpiPct!==null?kpiPct+"%":"—"}</div>
        </div>
        <div style="background:#f9fafb;padding:14px;border-radius:10px;border:1px solid #e5e7eb;text-align:center;">
          <div style="font-size:9px;color:#374151;font-weight:800;letter-spacing:0.5px;margin-bottom:4px;">STATUS</div>
          <div style="font-size:11px;font-weight:900;color:${kpiColor};margin-top:4px;">${kpiLabel}</div>
        </div>
      </div>

      <!-- Self Score -->
      <div style="display:grid;grid-template-columns:1fr 2fr;gap:16px;">
        <div style="background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:14px;text-align:center;">
          <div style="font-size:9px;color:#92400e;font-weight:800;letter-spacing:0.5px;margin-bottom:6px;">PENILAIAN DIRI</div>
          <div style="font-size:24px;margin-bottom:4px;">${starBar}</div>
          <div style="font-size:13px;font-weight:800;color:#92400e;">${starScore}/5 — ${starLabels[starScore]||"Belum dinilai"}</div>
        </div>
        <div>
          ${e.catatanDiri ? `
          <div style="background:#f9fafb;border-radius:8px;padding:12px;margin-bottom:10px;border-left:3px solid #7c3aed;">
            <div style="font-size:9px;font-weight:800;color:#7c3aed;letter-spacing:0.5px;margin-bottom:5px;">📝 CATATAN EVALUASI DIRI</div>
            <div style="font-size:12px;line-height:1.7;color:#374151;">${e.catatanDiri}</div>
          </div>` : ""}
          ${e.rencanaTindakLanjut ? `
          <div style="background:#f0fdf4;border-radius:8px;padding:12px;border-left:3px solid #16a34a;">
            <div style="font-size:9px;font-weight:800;color:#15803d;letter-spacing:0.5px;margin-bottom:5px;">🔜 RENCANA TINDAK LANJUT</div>
            <div style="font-size:12px;line-height:1.7;color:#374151;">${e.rencanaTindakLanjut}</div>
          </div>` : ""}
          ${!e.catatanDiri && !e.rencanaTindakLanjut ? `<div style="color:#9ca3af;font-size:12px;padding:10px;">—</div>` : ""}
        </div>
      </div>
    </div>
  </div>

  <!-- ══════════ RINGKASAN SEMUA WILAYAH ══════════ -->
  <div style="margin-bottom:32px;border:1.5px solid #d1fae5;border-radius:14px;overflow:hidden;">
    <div style="background:#f0fdf4;padding:12px 18px;border-bottom:1.5px solid #d1fae5;display:flex;align-items:center;justify-content:space-between;">
      <div style="display:flex;align-items:center;gap:8px;">
        <span style="font-size:14px;">🗺️</span>
        <span style="color:#15803d;font-weight:800;font-size:13px;letter-spacing:0.5px;">RINGKASAN SEMUA WILAYAH</span>
      </div>
      <span style="background:#15803d;color:#fff;font-size:10px;font-weight:800;padding:3px 10px;border-radius:20px;">${e.wilayahData?.length||0} Wilayah</span>
    </div>
    <div style="overflow-x:auto;">
      <table style="width:100%;border-collapse:collapse;font-size:12px;min-width:700px;">
        <thead>
          <tr style="background:#f9fafb;border-bottom:2px solid #d1fae5;">
            <th style="padding:10px;text-align:left;font-size:10px;color:#374151;font-weight:800;letter-spacing:0.5px;width:32px;">#</th>
            <th style="padding:10px;text-align:left;font-size:10px;color:#374151;font-weight:800;letter-spacing:0.5px;">WILAYAH</th>
            <th style="padding:10px;text-align:left;font-size:10px;color:#374151;font-weight:800;letter-spacing:0.5px;">KOMODITAS</th>
            <th style="padding:10px;text-align:center;font-size:10px;color:#374151;font-weight:800;letter-spacing:0.5px;">FASE</th>
            <th style="padding:10px;text-align:center;font-size:10px;color:#374151;font-weight:800;letter-spacing:0.5px;">PETANI</th>
            <th style="padding:10px;text-align:center;font-size:10px;color:#374151;font-weight:800;letter-spacing:0.5px;">KIOS</th>
            <th style="padding:10px;text-align:center;font-size:10px;color:#374151;font-weight:800;letter-spacing:0.5px;">DAYA BELI</th>
            <th style="padding:10px;text-align:left;font-size:10px;color:#374151;font-weight:800;letter-spacing:0.5px;">REKOMENDASI PRODUK</th>
          </tr>
        </thead>
        <tbody>
          ${summaryRows}
        </tbody>
      </table>
    </div>
  </div>

  <!-- ══════════ DETAIL PER WILAYAH ══════════ -->
  <div style="margin-bottom:20px;display:flex;align-items:center;gap:10px;">
    <div style="height:2px;flex:1;background:linear-gradient(to right,#16a34a,transparent);"></div>
    <div style="font-size:11px;font-weight:800;color:#15803d;letter-spacing:2px;white-space:nowrap;">DETAIL PER WILAYAH</div>
    <div style="height:2px;flex:1;background:linear-gradient(to left,#16a34a,transparent);"></div>
  </div>

  ${wilayahBlocks}

  <!-- ══════════ ADMIN NOTES ══════════ -->
  <div style="margin-bottom:28px;border:2px dashed #d1d5db;border-radius:14px;padding:20px;page-break-inside:avoid;">
    <div style="font-size:9px;font-weight:800;color:#6b7280;letter-spacing:2px;margin-bottom:14px;">KOLOM EVALUASI ADMIN (TIDAK DIISI SALES)</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
      <div>
        <div style="font-size:10px;font-weight:700;color:#374151;margin-bottom:6px;">Catatan Admin</div>
        <div style="border-bottom:1px solid #d1d5db;height:28px;margin-bottom:10px;"></div>
        <div style="border-bottom:1px solid #d1d5db;height:28px;margin-bottom:10px;"></div>
        <div style="border-bottom:1px solid #d1d5db;height:28px;"></div>
      </div>
      <div>
        <div style="font-size:10px;font-weight:700;color:#374151;margin-bottom:6px;">Skor Evaluasi Admin (1–10)</div>
        <div style="display:flex;gap:8px;margin-top:4px;">
          ${[...Array(10)].map((_,i)=>`<div style="width:28px;height:28px;border:1.5px solid #d1d5db;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#9ca3af;">${i+1}</div>`).join("")}
        </div>
        <div style="margin-top:14px;">
          <div style="font-size:10px;font-weight:700;color:#374151;margin-bottom:6px;">Tanda Tangan Admin</div>
          <div style="border-bottom:1px solid #d1d5db;height:40px;"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ══════════ FOOTER ══════════ -->
  <div style="border-top:1px solid #e5e7eb;padding-top:14px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;">
    <div style="font-size:10px;color:#9ca3af;">CV. Surya Makmur Mandiri · Sistem Analisis Pasar · ${cetakTgl}</div>
    <div style="font-size:10px;color:#9ca3af;">${noLaporan} · ${e.nama}</div>
  </div>

  <!-- Print Button -->
  <div class="no-print" style="margin-top:28px;padding:20px;background:#f9fafb;border-radius:12px;border:1px dashed #d1d5db;text-align:center;">
    <div style="font-size:12px;color:#6b7280;margin-bottom:12px;">Siap dicetak atau disimpan sebagai PDF</div>
    <button onclick="window.print()" style="padding:13px 32px;background:linear-gradient(135deg,#15803d,#16a34a);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;margin-right:10px;box-shadow:0 4px 12px rgba(22,163,74,0.3);">🖨️ Cetak / Simpan PDF</button>
    <button onclick="window.close()" style="padding:13px 20px;background:#fff;color:#374151;border:1.5px solid #d1d5db;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;">✕ Tutup</button>
  </div>

</div>
</body>
</html>`;
    }

    function exportToPdf(e) {
      const html = buildPdfHtml(e);
      const blob = new Blob([html],{type:"text/html"});
      const url = URL.createObjectURL(blob);
      const win = window.open(url,"_blank");
      if (!win) alert("Popup diblokir. Izinkan popup untuk halaman ini lalu coba lagi.");
      else setTimeout(()=>URL.revokeObjectURL(url),15000);
    }

    function RekapView({ refresh }) {
      const [entries, setEntries] = useState([]);
      const [selectedId, setSelectedId] = useState(null);
      const [filter, setFilter] = useState("");

      useEffect(()=>{ setEntries(loadEntries()); }, [refresh]);

      const deleteItem = (id) => {
        if (!confirm("Hapus laporan ini secara permanen?")) return;
        const newList = entries.filter(e=>e.id!==id);
        saveEntries(newList);
        setEntries(newList);
        setSelectedId(null);
      };

      const filtered = entries.filter(e => {
        const q = filter.toLowerCase();
        return !q || e.nama.toLowerCase().includes(q) || e.kabupaten?.toLowerCase().includes(q) || e.periode?.toLowerCase().includes(q) || e.wilayahData?.some(w => w.namaWilayah.toLowerCase().includes(q));
      });

      if (selectedId) {
        const e = entries.find(x=>x.id===selectedId);
        if (!e) { setSelectedId(null); return null; }
        const starLabels = ["","Sangat Kurang","Kurang","Cukup","Baik","Sangat Baik"];
        return (
          <div>
            <button className="btn-back" onClick={()=>setSelectedId(null)}>← Kembali ke Daftar</button>
            <div className="detail-header">
              <div style={{fontSize:22,fontWeight:900,marginBottom:4}}>{e.nama}</div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:8}}>
                {e.kabupaten && <span style={{background:"rgba(255,255,255,0.2)",borderRadius:6,padding:"2px 10px",fontSize:12,fontWeight:600}}>🗺️ {e.kabupaten}</span>}
                {e.periode && <span style={{background:"rgba(255,255,255,0.15)",borderRadius:6,padding:"2px 10px",fontSize:12}}>🗓 {e.periode}</span>}
              </div>
              <div style={{fontSize:12,opacity:0.7}}>{e.wilayahData?.length} wilayah · Dikirim {new Date(e.createdAt).toLocaleDateString("id-ID")}</div>
            </div>

            {/* KPI Preview */}
            {(e.targetKunjungan || e.realisasiKunjungan || e.selfScore > 0) && (
              <div className="card">
                <div className="section-header" style={{color:"#7c3aed"}}>📊 KINERJA</div>
                <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
                  {e.targetKunjungan && <div style={{background:"#f5f3ff",padding:"8px 14px",borderRadius:8,fontSize:12}}><span style={{color:"#6b7280"}}>Target: </span><strong style={{color:"#5b21b6"}}>{e.targetKunjungan}</strong></div>}
                  {e.realisasiKunjungan && <div style={{background:"#f0fdf4",padding:"8px 14px",borderRadius:8,fontSize:12}}><span style={{color:"#6b7280"}}>Realisasi: </span><strong style={{color:"#15803d"}}>{e.realisasiKunjungan}</strong></div>}
                  {e.selfScore > 0 && <div style={{background:"#fffbeb",padding:"8px 14px",borderRadius:8,fontSize:12}}><span style={{color:"#6b7280"}}>Skor diri: </span><strong style={{color:"#d97706"}}>{e.selfScore}/5 — {starLabels[e.selfScore]}</strong></div>}
                </div>
              </div>
            )}

            <button className="btn-pdf" onClick={()=>exportToPdf(e)}>📄 Export PDF / Cetak Laporan Ini</button>

            <div style={{fontSize:12,fontWeight:700,color:"#374151",marginBottom:10}}>Detail Per Wilayah — klik untuk buka ↓</div>
            {e.wilayahData?.map((w,i)=><WilayahDetail key={i} w={w} />)}

            <button className="btn-danger" style={{width:"100%",marginTop:10}} onClick={()=>deleteItem(e.id)}>
              🗑️ Hapus Laporan Ini
            </button>
          </div>
        );
      }

      const totalWilayah = entries.reduce((s,e)=>s+(e.wilayahData?.length||0),0);
      return (
        <div>
          <div className="stats-bar">
            <div style={{fontSize:12,opacity:0.8,fontWeight:500}}>Total Laporan Masuk</div>
            <div style={{fontSize:36,fontWeight:900,lineHeight:1.1}}>{entries.length}</div>
            <div style={{fontSize:12,opacity:0.65,marginTop:2}}>{totalWilayah} wilayah tercatat · Surya Makmur Mandiri</div>
          </div>
          <div className="search-wrap">
            <span className="search-icon">🔍</span>
            <input className="search-box" value={filter} onChange={e=>setFilter(e.target.value)} placeholder="Cari nama sales, kabupaten, kecamatan, periode..." />
          </div>
          {filtered.length === 0 ? (
            <div style={{textAlign:"center",padding:"50px 20px",color:"#9ca3af"}}>
              <div style={{fontSize:42,marginBottom:10}}>📭</div>
              <div style={{fontSize:14,fontWeight:600}}>{entries.length===0 ? "Belum ada laporan tersimpan" : "Tidak ditemukan"}</div>
              {entries.length===0 && <div style={{fontSize:12,marginTop:4}}>Isi form Input Laporan untuk mulai</div>}
            </div>
          ) : filtered.map(e => (
            <div key={e.id} className="rekap-card" onClick={()=>setSelectedId(e.id)}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                <div>
                  <div style={{fontWeight:800,fontSize:16,color:"#111827",marginBottom:3}}>{e.nama}</div>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                    {e.kabupaten && <span style={{fontSize:11,background:"#f0fdf4",color:"#15803d",padding:"2px 8px",borderRadius:5,fontWeight:700}}>🗺️ {e.kabupaten}</span>}
                    {e.periode && <span style={{fontSize:12,color:"#6b7280"}}>🗓 {e.periode}</span>}
                    {e.selfScore > 0 && <span style={{fontSize:11,background:"#fffbeb",color:"#d97706",padding:"2px 8px",borderRadius:5,fontWeight:700}}>⭐ {e.selfScore}/5</span>}
                  </div>
                </div>
                <span style={{background:"#f0fdf4",color:"#15803d",fontWeight:800,fontSize:13,padding:"4px 10px",borderRadius:8,whiteSpace:"nowrap"}}>{e.wilayahData?.length} wilayah</span>
              </div>
              <div style={{display:"flex",flexWrap:"wrap",gap:5,marginTop:10}}>
                {e.wilayahData?.map((w,i)=>(
                  <span key={i} style={{fontSize:11,background:"#f3f4f6",color:"#374151",padding:"3px 9px",borderRadius:6}}>📍 {w.namaWilayah}</span>
                ))}
              </div>
              <div style={{fontSize:11,color:"#9ca3af",marginTop:8}}>Dikirim {new Date(e.createdAt).toLocaleDateString("id-ID")}</div>
            </div>
          ))}
        </div>
      );
    }

    function App() {
      const [tab, setTab] = useState("form");
      const [refresh, setRefresh] = useState(0);
      return (
        <div>
          <div className="header">
            <div className="header-inner">
              <div className="header-brand">SURYA MAKMUR MANDIRI</div>
              <div className="header-title">Market Analysis v3.4</div>
              <div className="header-sub">Pemetaan Potensi Pasar · Tim Sales</div>
              <div className="tab-bar">
                <button className={`tab-btn ${tab==="form"?"active":"inactive"}`} onClick={()=>setTab("form")}>📝 INPUT LAPORAN</button>
                <button className={`tab-btn ${tab==="rekap"?"active":"inactive"}`} onClick={()=>setTab("rekap")}>📊 REKAP DATA</button>
              </div>
            </div>
          </div>
          <div className="main">
            {tab==="form"
              ? <FormView onSave={()=>{ setRefresh(r=>r+1); setTab("rekap"); }} />
              : <RekapView refresh={refresh} />}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
