<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMM Market Analysis</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #root { min-height: 100vh; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Simulasi window.storage agar kompatibel dengan browser HP
        window.storage = {
            get: async (key) => ({ value: localStorage.getItem(key) }),
            set: async (key, val) => localStorage.setItem(key, val)
        };

        const KOMODITAS = ["Padi", "Jagung", "Cabai", "Bawang Merah", "Bawang Putih", "Tomat", "Kedelai", "Singkong", "Kentang", "Lainnya"];
        const FASE = ["Pengolahan Lahan", "Vegetatif", "Generatif", "Panen"];
        const STORAGE_KEY = "smm-market-v3";

        const emptyWilayah = () => ({
            _id: Date.now() + Math.random(),
            namaWilayah: "",
            komoditas: [], fase: [],
            jumlahPetani: "", jumlahKios: "", dayaBeli: "", catatanWilayah: "",
            kendalaUtama: "", kendalaDistribusi: "", kendalaKompetitor: "", kendalaProduk: "",
            produk1: "", alasan1: "", produk2: "", alasan2: "", produk3: "", alasan3: "",
            kebutuhanBelumAda: ""
        });

        const emptyForm = () => ({
            nama: "", periode: "", kabupaten: "",
            wilayahData: [emptyWilayah()]
        });

        async function loadEntries() {
            try {
                const d = await window.storage.get(STORAGE_KEY);
                return d.value ? JSON.parse(d.value) : [];
            } catch { return []; }
        }
        async function saveEntries(list) {
            await window.storage.set(STORAGE_KEY, JSON.stringify(list));
        }

        function Badge({ children, color = "green" }) {
            const bg = { green: "#d1fae5", yellow: "#fef3c7", red: "#fee2e2", blue: "#dbeafe", gray: "#f3f4f6" };
            const fg = { green: "#065f46", yellow: "#92400e", red: "#991b1b", blue: "#1e40af", gray: "#374151" };
            return <span style={{ padding: "2px 10px", borderRadius: 20, fontSize: 11, fontWeight: 600, background: bg[color], color: fg[color], marginRight: 4 }}>{children}</span>;
        }

        function CheckGroup({ options, selected, onChange, color = "#16a34a" }) {
            return (
                <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                    {options.map(opt => {
                        const active = selected.includes(opt);
                        return (
                            <button key={opt} onClick={() => onChange(active ? selected.filter(x => x !== opt) : [...selected, opt])}
                                style={{ padding: "6px 12px", borderRadius: 20, fontSize: 12, cursor: "pointer", border: `1.5px solid ${active ? color : "#d1d5db"}`, background: active ? color : "#fff", color: active ? "#fff" : "#374151", fontWeight: active ? 600 : 400 }}>
                                {opt}
                            </button>
                        );
                    })}
                </div>
            );
        }

        function Field({ label, value, onChange, placeholder }) {
            return (
                <div style={{ marginBottom: 12 }}>
                    <label style={{ fontSize: 12, fontWeight: 600, color: "#374151", display: "block", marginBottom: 4 }}>{label}</label>
                    <input value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder}
                        style={{ width: "100%", padding: "10px", borderRadius: 8, border: "1.5px solid #d1d5db", fontSize: 14, outline: "none", boxSizing: "border-box" }} />
                </div>
            );
        }

        function Area({ label, value, onChange, placeholder }) {
            return (
                <div style={{ marginBottom: 12 }}>
                    <label style={{ fontSize: 12, fontWeight: 600, color: "#374151", display: "block", marginBottom: 4 }}>{label}</label>
                    <textarea value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder} rows={3}
                        style={{ width: "100%", padding: "10px", borderRadius: 8, border: "1.5px solid #d1d5db", fontSize: 14, outline: "none", resize: "none", boxSizing: "border-box", fontFamily: "inherit" }} />
                </div>
            );
        }

        function WilayahCard({ data, index, onChange, onRemove, canRemove }) {
            const [open, setOpen] = useState(true);
            const set = (key) => (val) => onChange({ ...data, [key]: val });
            const dbc = (d) => d === "Tinggi" ? "#16a34a" : d === "Sedang" ? "#d97706" : "#dc2626";

            return (
                <div style={{ border: "1.5px solid #e5e7eb", borderRadius: 12, marginBottom: 16, overflow: "hidden", background: "#fff" }}>
                    <div onClick={() => setOpen(!open)} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "14px", background: open ? "#f0fdf4" : "#f9fafb", cursor: "pointer" }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                            <div style={{ background: "#16a34a", color: "#fff", borderRadius: 6, padding: "2px 8px", fontSize: 12, fontWeight: 800 }}>W{index + 1}</div>
                            <span style={{ fontSize: 14, fontWeight: 700 }}>{data.namaWilayah || "Wilayah Baru"}</span>
                        </div>
                        <span>{open ? "▲" : "▼"}</span>
                    </div>

                    {open && (
                        <div style={{ padding: 14 }}>
                            <Field label="📍 Nama Kecamatan / Wilayah *" value={data.namaWilayah} onChange={set("namaWilayah")} placeholder="Contoh: Kec. Jatibarang" />
                            
                            <div style={{ background: "#f8fafc", padding: 12, borderRadius: 8, marginBottom: 12 }}>
                                <label style={{ fontSize: 12, fontWeight: 700, color: "#16a34a", display: "block", marginBottom: 8 }}>🌾 POTENSI</label>
                                <div style={{ marginBottom: 10 }}>
                                    <CheckGroup options={KOMODITAS} selected={data.komoditas} onChange={set("komoditas")} />
                                </div>
                                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                                    <Field label="Petani (est.)" value={data.jumlahPetani} onChange={set("jumlahPetani")} />
                                    <Field label="Kios (est.)" value={data.jumlahKios} onChange={set("jumlahKios")} />
                                </div>
                                <Area label="Catatan" value={data.catatanWilayah} onChange={set("catatanWilayah")} />
                            </div>

                            <div style={{ background: "#fef2f2", padding: 12, borderRadius: 8, marginBottom: 12 }}>
                                <label style={{ fontSize: 12, fontWeight: 700, color: "#dc2626", display: "block", marginBottom: 8 }}>⚠️ KENDALA</label>
                                <Area label="Kendala Utama" value={data.kendalaUtama} onChange={set("kendalaUtama")} />
                                <Area label="Kendala Kompetitor" value={data.kendalaKompetitor} onChange={set("kendalaKompetitor")} />
                            </div>

                            <div style={{ background: "#eff6ff", padding: 12, borderRadius: 8 }}>
                                <label style={{ fontSize: 12, fontWeight: 700, color: "#1d4ed8", display: "block", marginBottom: 8 }}>🧪 REKOMENDASI</label>
                                <Field label="Produk 1" value={data.produk1} onChange={set("produk1")} />
                                <Field label="Alasan" value={data.alasan1} onChange={set("alasan1")} />
                            </div>

                            {canRemove && (
                                <button onClick={onRemove} style={{ width: "100%", marginTop: 12, padding: 8, color: "#dc2626", background: "none", border: "1px solid #fecaca", borderRadius: 6, fontSize: 12, cursor: "pointer" }}>Hapus Wilayah</button>
                            )}
                        </div>
                    )}
                </div>
            );
        }

        function App() {
            const [tab, setTab] = useState("form");
            const [form, setForm] = useState(emptyForm());
            const [entries, setEntries] = useState([]);

            useEffect(() => { 
                loadEntries().then(setEntries);
            }, []);

            const handleSave = async () => {
                if (!form.nama) return alert("Nama Sales wajib diisi");
                const list = await loadEntries();
                const newEntry = { ...form, id: Date.now(), createdAt: new Date().toISOString() };
                const newList = [newEntry, ...list];
                await saveEntries(newList);
                setEntries(newList);
                setForm(emptyForm());
                setTab("rekap");
                alert("Berhasil disimpan!");
            };

            return (
                <div style={{ background: "#f0fdf4", minHeight: "100vh" }}>
                    <div style={{ background: "#15803d", padding: "20px", color: "#fff", textAlign: "center" }}>
                        <h2 style={{ margin: 0 }}>SMM Market Analysis</h2>
                        <p style={{ margin: "5px 0 15px", opacity: 0.8, fontSize: 12 }}>CV. Sugih Mekar Mandiri</p>
                        <div style={{ display: "flex", gap: 5, justifyContent: "center" }}>
                            <button onClick={() => setTab("form")} style={{ flex: 1, padding: 10, background: tab === "form" ? "#fff" : "rgba(255,255,255,0.2)", color: tab === "form" ? "#15803d" : "#fff", border: "none", borderRadius: 8, fontWeight: 700 }}>Input Data</button>
                            <button onClick={() => setTab("rekap")} style={{ flex: 1, padding: 10, background: tab === "rekap" ? "#fff" : "rgba(255,255,255,0.2)", color: tab === "rekap" ? "#15803d" : "#fff", border: "none", borderRadius: 8, fontWeight: 700 }}>Rekap ({entries.length})</button>
                        </div>
                    </div>

                    <div style={{ maxWidth: 600, margin: "0 auto", padding: 16 }}>
                        {tab === "form" ? (
                            <div>
                                <div style={{ background: "#fff", padding: 16, borderRadius: 12, marginBottom: 16, border: "1px solid #e5e7eb" }}>
                                    <Field label="Nama Sales *" value={form.nama} onChange={(v) => setForm({ ...form, nama: v })} placeholder="Nama Lengkap" />
                                    <Field label="Kabupaten" value={form.kabupaten} onChange={(v) => setForm({ ...form, kabupaten: v })} placeholder="Contoh: Indramayu" />
                                </div>
                                
                                {form.wilayahData.map((w, i) => (
                                    <WilayahCard key={w._id} index={i} data={w} 
                                        canRemove={form.wilayahData.length > 1}
                                        onRemove={() => setForm({ ...form, wilayahData: form.wilayahData.filter((_, idx) => idx !== i) })}
                                        onChange={(val) => {
                                            const nd = [...form.wilayahData]; nd[i] = val;
                                            setForm({ ...form, wilayahData: nd });
                                        }} />
                                ))}

                                <button onClick={() => setForm({ ...form, wilayahData: [...form.wilayahData, emptyWilayah()] })}
                                    style={{ width: "100%", padding: 12, marginBottom: 12, borderRadius: 10, border: "2px dashed #16a34a", background: "#fff", color: "#16a34a", fontWeight: 700 }}>+ Tambah Wilayah</button>
                                
                                <button onClick={handleSave}
                                    style={{ width: "100%", padding: 15, borderRadius: 10, background: "#16a34a", color: "#fff", border: "none", fontWeight: 800, fontSize: 16 }}>Simpan Laporan</button>
                            </div>
                        ) : (
                            <div>
                                {entries.map(e => (
                                    <div key={e.id} style={{ background: "#fff", padding: 14, borderRadius: 12, marginBottom: 10, border: "1px solid #e5e7eb" }}>
                                        <div style={{ fontWeight: 800 }}>{e.nama}</div>
                                        <div style={{ fontSize: 12, color: "#6b7280" }}>{e.kabupaten} • {e.wilayahData.length} Wilayah</div>
                                        <div style={{ marginTop: 8, fontSize: 11, color: "#9ca3af" }}>{new Date(e.createdAt).toLocaleDateString("id-ID")}</div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
